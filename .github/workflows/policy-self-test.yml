# 정책 repo 자신의 CI.
# 정책 변경 PR마다 fixture corpus 전체를 돌려 회귀를 막는다.
# 이게 falsification 메커니즘이 실제로 *집행*되는 곳.

name: policy-self-test

on:
  push:
    branches: [main]
  pull_request:

# 정책 repo 자신의 워크플로우도 같은 규칙 적용 — pinning 강제
concurrency:
  group: policy-self-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Job 1: 워크플로우 자신의 pinning 검증 ----------
  workflow-pins:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Verify workflow SHA pinning
        run: bash scripts/verify-workflow-pins.sh

  # ---------- Job 2: Fixture corpus 회귀 검사 ----------
  fixture-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Run deterministic-only fixture tests
        run: bash skills/pre-merge-review/examples/run-tests.sh

      - name: Run integrated fixture tests (with mock LLM)
        run: bash skills/pre-merge-review/examples/run-tests-integrated.sh

  # ---------- Job 3: Bootstrap script 사전 검증 ----------
  # bootstrap-consumer.sh가 syntax/help/dry-run에서 정상 동작하는지.
  # 실제 PR 생성까지는 별도 e2e (사용자가 본인 repo에서 수행).
  bootstrap-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: bash -n syntax check
        run: |
          bash -n scripts/bootstrap-consumer.sh
          bash -n scripts/pin-actions.sh
          bash -n scripts/verify-workflow-pins.sh

      - name: bootstrap-consumer.sh --help 동작
        run: ./scripts/bootstrap-consumer.sh --help

      - name: pin-actions.sh sed_inplace macOS 분기 dry-test
        run: |
          # Ubuntu 환경에선 GNU sed 분기 — 실제 in-place 작동
          TMP=$(mktemp)
          echo "hello" > "$TMP"
          # 직접 함수 추출 + 실행
          source <(sed -n '/^sed_inplace()/,/^}/p' scripts/pin-actions.sh)
          sed_inplace 's|hello|world|' "$TMP"
          grep -q world "$TMP" && echo "✓ sed_inplace OK"
          rm "$TMP"

  # ---------- Job 4: Reusable workflow self-call (소비자 시뮬레이션) ----------
  # 이 정책 repo 자신이 v0.16+ reusable workflow를 호출해 본다.
  # 호출 자체가 성공하면 다른 소비자도 호출 가능하다는 신호.
  # 단 정책 repo 본인이 호출하면 SHA가 PR head 자체이므로 'identical' 검증은 PR에서만 의미.
  reusable-self-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # 소비자 시뮬레이션이라 write 불요
    timeout-minutes: 5
    steps:
      - name: Sanity — reusable workflow YAML 파싱
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Validate workflow YAML structure
        run: |
          python3 -c "
          import yaml, sys
          for path in ['.github/workflows/pre-merge-review.yml',
                       '.github/workflows/policy-bump-watcher.yml']:
              data = yaml.safe_load(open(path))
              triggers = list(data.get(True, data.get('on', {})).keys()) if isinstance(data.get(True, data.get('on')), dict) else []
              assert 'workflow_call' in str(data), f'{path}: workflow_call trigger 누락'
              print(f'✓ {path}: workflow_call trigger 존재')
          "

  # ---------- Mock vs Production drift 검증 ----------
  # 비용 발생 작업 — schedule trigger 또는 수동 trigger에서만 실행.
  # PR마다 돌리지 않는다. baseline 갱신 PR에는 별도 수동 검증 필요.
  mock-drift:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Verify mock vs production LLM
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 skills/pre-merge-review/examples/verify-mock-vs-production.py
        continue-on-error: true  # drift는 정보 — 실패가 정책 변경을 막으면 안 됨

      - name: Notify on drift
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"📊 Mock vs Production drift detected in changeguard. Review mock responses or investigate LLM behavior change."}' \
              "$SLACK_WEBHOOK_URL"
          fi
