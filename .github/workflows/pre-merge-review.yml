# changeguard pre-merge-review — Reusable workflow (v0.16+)
#
# 정책 본부: https://github.com/sapadmin-df/changeguard (public)
#
# 사용 방법 (소비자 측):
#   소비자 repo의 .github/workflows/pre-merge-review.yml 에 다음과 같이 작성:
#
#     name: pre-merge-review
#     on:
#       push: { branches: [main] }    # 또는 [master], [develop] 등
#       pull_request: {}
#     jobs:
#       review:
#         uses: sapadmin-df/changeguard/.github/workflows/pre-merge-review.yml@<SHA>
#         secrets:
#           ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#           SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
#
#   소비자가 작성할 분량은 5-10줄. 모든 게이트 로직은 이 reusable workflow 안에.
#   "uses: ...@<SHA>" 의 SHA는 changeguard main의 commit SHA — 명시적 갱신만 허용
#   (mutable tag/branch 금지). watcher가 매주 갱신 PR을 제안.
#
# 호환성: v0.15 이전 .template 방식 소비자는 docs/UPGRADING.md 참조.

name: pre-merge-review (reusable)

on:
  workflow_call:
    inputs:
      policy_sha:
        description: "정책 SHA — 호출자가 'uses: ...@<SHA>' 의 SHA와 *같은 값*을 여기에 명시. github.workflow_sha 는 호출자 commit 을 가리키므로 정책 SHA로 사용할 수 없음 (GitHub Actions 제약). watcher가 두 값을 동시에 갱신함."
        type: string
        required: true
      policy_repo:
        description: "정책 repo (기본 sapadmin-df/changeguard). 사실상 변경 불필요."
        type: string
        required: false
        default: "sapadmin-df/changeguard"
    secrets:
      ANTHROPIC_API_KEY:
        description: "Claude API 키 — 없으면 결정론 검사만 수행."
        required: false
      SLACK_WEBHOOK_URL:
        description: "Slack incoming webhook — 없으면 stdout만."
        required: false

concurrency:
  group: pre-merge-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # PR comment + body 갱신 + bump PR 검색
    timeout-minutes: 10
    steps:
      # ---------- 0단계: 정책 SHA 검증 (호출자가 명시 전달) ----------
      # GitHub Actions의 reusable workflow는 "내가 어떤 SHA로 호출됐는가"를 자동
      # 알려주지 않음. github.workflow_sha 는 호출자(consumer) commit을 가리킴.
      # 그래서 호출자가 inputs.policy_sha 로 명시 전달해야 한다 — watcher가
      # 'uses: ...@<SHA>' 와 'with: policy_sha: <SHA>' 두 곳을 동시에 sed로 갱신.
      - name: Validate policy SHA input
        id: policy
        env:
          INPUT_POLICY_SHA: ${{ inputs.policy_sha }}
        run: |
          if [ -z "$INPUT_POLICY_SHA" ]; then
            echo "::error::inputs.policy_sha 가 비어있음 — 호출자 워크플로우에 with: { policy_sha: '<40-hex>' } 명시 필요."
            exit 1
          fi
          if ! [[ "$INPUT_POLICY_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "::error::policy_sha 형식 부적합 ($INPUT_POLICY_SHA) — 40자 hex만 허용"
            exit 1
          fi
          echo "policy_sha=$INPUT_POLICY_SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::Policy SHA = $INPUT_POLICY_SHA"

      # ---------- 1단계: changeguard 정책 코드 checkout (SHA pin 강제) ----------
      # workflow_call inputs/outputs를 step-level로 직접 사용 (workflow-level env: 가
      # reusable workflow의 step scope에서 어색하게 평가되는 경우 회피).
      # actions/checkout v6.0.2
      - name: Checkout policy code at pinned SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.policy_repo }}
          ref: ${{ steps.policy.outputs.policy_sha }}
          path: .policy

      - name: Verify policy SHA matches expectation
        env:
          POLICY_REPO_IN: ${{ inputs.policy_repo }}
          EXPECTED_SHA: ${{ steps.policy.outputs.policy_sha }}
        run: |
          actual=$(git -C .policy rev-parse HEAD)
          if [ "$actual" != "$EXPECTED_SHA" ]; then
            echo "::error::Policy SHA mismatch: expected $EXPECTED_SHA, got $actual"
            exit 1
          fi
          echo "POLICY_REPO=$POLICY_REPO_IN" >> "$GITHUB_ENV"
          echo "POLICY_REPO_SHA=$actual"     >> "$GITHUB_ENV"
          echo "POLICY_VERSION=$(cat .policy/VERSION)" >> "$GITHUB_ENV"
          echo "POLICY_SHA=$actual"          >> "$GITHUB_ENV"

      # ---------- 2단계: 소비자 repo checkout (incoming diff 계산용) ----------
      # actions/checkout v6.0.2
      - name: Checkout consumer repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: .consumer
          fetch-depth: 0

      # ---------- 3단계: incoming diff 계산 ----------
      - name: Compute incoming diff
        id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.after }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .consumer
        run: |
          # PR이면 base..head, push면 before..after.
          # workflow_dispatch 또는 일부 이벤트는 base가 비어있을 수 있음 → default branch에서 fallback.
          if [ -z "$BASE_SHA" ]; then
            DEFAULT_BRANCH=$(gh api "repos/$GITHUB_REPOSITORY" --jq .default_branch 2>/dev/null || echo main)
            BASE_SHA=$(git rev-parse "origin/$DEFAULT_BRANCH" 2>/dev/null || true)
          fi
          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA=$(git rev-parse HEAD)
          fi
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "::warning::base SHA 부재/zero — diff 검사 건너뜀."
            : > /tmp/incoming.diff
          else
            git diff "$BASE_SHA".."$HEAD_SHA" > /tmp/incoming.diff
          fi
          echo "diff_lines=$(wc -l < /tmp/incoming.diff)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$BASE_SHA" >> "$GITHUB_ENV"
          echo "incoming_sha=$HEAD_SHA" >> "$GITHUB_ENV"

      # ---------- 4단계: pre-merge review 실행 (ci-caller.py) ----------
      - name: Run pre-merge review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          POLICY_PATH: .policy
          BASE_REF: ${{ env.base_sha }}
          INCOMING_REF: ${{ env.incoming_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .consumer
        run: |
          python3 ../.policy/skills/pre-merge-review/checks/ci-caller.py \
            --diff /tmp/incoming.diff \
            --output /tmp/review-result.json
        continue-on-error: false

      # ---------- 5단계: 결과 아티팩트 ----------
      # actions/upload-artifact v7.0.1
      - name: Upload review result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pre-merge-review-${{ github.run_id }}
          path: /tmp/review-result.json
          retention-days: 30

      # ---------- 6단계: inline annotations ----------
      # actions/github-script v9.0.0
      - name: Emit inline annotations
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require('fs');
            let result;
            try {
              result = JSON.parse(fs.readFileSync('/tmp/review-result.json', 'utf8'));
            } catch (e) {
              core.warning(`No review result to annotate: ${e.message}`);
              return;
            }
            for (const f of (result.findings || [])) {
              const loc = f.location || '';
              const m = loc.match(/^([^:]+?)(?::(\d+)(?:-(\d+))?)?$/);
              if (!m) continue;
              const [, file, startLine, endLine] = m;
              if (!file) continue;
              const props = { file, title: `[${f.severity}] ${f.category}` };
              if (startLine) {
                props.startLine = parseInt(startLine, 10);
                props.endLine = endLine ? parseInt(endLine, 10) : parseInt(startLine, 10);
              }
              const msg = (f.description || '').slice(0, 400);
              if (f.severity === 'critical' || f.severity === 'high') {
                core.error(msg, props);
              } else if (f.severity === 'medium') {
                core.warning(msg, props);
              } else {
                core.notice(msg, props);
              }
            }

      # ---------- 7단계: PR body summary + PR comment ----------
      # actions/github-script v9.0.0
      - name: Update PR body + comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          POLICY_REPO: ${{ env.POLICY_REPO }}
        with:
          script: |
            const fs = require('fs');
            let result;
            try {
              result = JSON.parse(fs.readFileSync('/tmp/review-result.json', 'utf8'));
            } catch (e) {
              core.warning(`Could not read review result: ${e.message}`);
              return;
            }
            if (result.verdict === 'pass') return;

            const server = context.serverUrl || 'https://github.com';
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const policyRepo = process.env.POLICY_REPO || 'sapadmin-df/changeguard';
            const headSha = context.payload.pull_request?.head?.sha || context.sha;
            const runId = context.runId;
            const prNumber = context.issue.number;

            const mdLink = (url, text) => `[${text}](${url})`;
            const linkSha = (r, sha) => sha
              ? mdLink(`${server}/${r}/commit/${sha}`, `\`${sha.slice(0,12)}\``)
              : '`unknown`';
            const linkFile = (r, sha, loc) => {
              if (!loc || !sha) return `\`${loc || '?'}\``;
              const m = loc.match(/^([^:]+?)(?::(\d+)(?:-(\d+))?)?$/);
              if (!m) return `\`${loc}\``;
              const [, path, l1, l2] = m;
              let url = `${server}/${r}/blob/${sha}/${path}`;
              if (l1) { url += `#L${l1}`; if (l2) url += `-L${l2}`; }
              return mdLink(url, `\`${loc}\``);
            };

            const intentBadgeMap = {
              intentional: '✓ 의도된 변경으로 판단',
              suspicious:  '⚠ 의심 단서 존재',
              unclear:     '? 판단 보류',
            };
            const assessment = result.assessment;
            const intentBadge = assessment && intentBadgeMap[assessment.intent]
              ? ` · LLM: ${intentBadgeMap[assessment.intent]}`
              : '';

            const emoji = result.verdict === 'block' ? '🚨' : '⚠️';
            const linkPolicyVer = mdLink(
              `${server}/${policyRepo}/blob/${result.policy_sha}/VERSION`,
              `\`${result.policy_version}\``
            );
            const linkPolicySha = linkSha(policyRepo, result.policy_sha);
            const linkRun = mdLink(
              `${server}/${repo}/actions/runs/${runId}`,
              'workflow run'
            );

            // PR body 상단 요약 블록 (idempotent)
            const SUMMARY_START = '<!-- pre-merge-summary-start -->';
            const SUMMARY_END = '<!-- pre-merge-summary-end -->';
            const severityCounts = {};
            for (const f of (result.findings || [])) {
              const s = f.severity || 'unknown';
              severityCounts[s] = (severityCounts[s] || 0) + 1;
            }
            const sevSummary = ['critical','high','medium','low'].map(
              s => severityCounts[s] ? `${severityCounts[s]} ${s}` : null
            ).filter(Boolean).join(', ') || '(no findings)';
            const summaryLine = `> ${emoji} **[Pre-Merge ${result.verdict}]** · ${sevSummary} · policy ${linkPolicyVer} (${linkPolicySha})${intentBadge} · ${linkRun}`;
            const summaryBlock = `${SUMMARY_START}\n${summaryLine}\n${SUMMARY_END}`;

            try {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: prNumber,
              });
              let existingBody = pr.data.body || '';
              const startIdx = existingBody.indexOf(SUMMARY_START);
              const endIdx = existingBody.indexOf(SUMMARY_END);
              let cleanBody = existingBody;
              if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
                cleanBody = (existingBody.slice(0, startIdx)
                              + existingBody.slice(endIdx + SUMMARY_END.length)).replace(/^\n+/, '');
              }
              const newBody = `${summaryBlock}\n\n${cleanBody}`;
              if (newBody !== existingBody) {
                await github.rest.pulls.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  pull_number: prNumber, body: newBody,
                });
              }
            } catch (e) {
              core.warning(`PR body update failed: ${e.message}`);
            }

            // 자동 검증 섹션 (POLICY_REPO_SHA bump일 때만)
            let bumpSection = '';
            const bump = result.policy_bump_verification;
            if (bump) {
              const newCommitLink = mdLink(`${server}/${bump.policy_repo}/commit/${bump.new_sha}`,
                                            `\`${bump.new_sha_short}\``);
              const compareLink = mdLink(bump.compare_url, '변경 내용 보기 (compare)');
              const lines = ['### ✅ 자동 검증 (POLICY_REPO_SHA 변경)', ''];
              if (bump.exists === true)
                lines.push(`- ✓ 새 SHA 존재 — ${newCommitLink}`);
              else if (bump.exists === false)
                lines.push(`- ✗ 새 SHA가 \`${bump.policy_repo}\` 에 없음 — 가짜/오타 의심`);
              if (bump.reachable_from_main === true)
                lines.push(`- ✓ main 브랜치에서 도달 가능 (\`${bump.ancestor_status}\`)`);
              else if (bump.reachable_from_main === false)
                lines.push(`- ✗ main 도달 불가 (\`${bump.ancestor_status}\`) — 포크/우회 의심`);
              if (bump.verified === true)
                lines.push(`- ✓ commit 서명 검증됨 (${bump.committer_login || '?'})`);
              else if (bump.verified === false)
                lines.push(`- ✗ commit 서명 미검증 (${bump.verification_reason})`);
              if (bump.author_login)
                lines.push(`- author: \`${bump.author_login}\`  ·  메시지: ${bump.message_first_line || '(empty)'}`);
              lines.push(`- → ${compareLink}`);
              const overallBadge = ({
                trusted:    '🟢 **신뢰 가능** — 정책 변경 내용만 검토하면 됩니다',
                unverified: '🟡 **서명 누락** — main 도달 가능하지만 commit 서명이 없습니다',
                suspicious: '🔴 **의심** — 위 ✗ 항목을 즉시 조사하세요',
                unknown:    '⚪ **검증 불완전** — 네트워크/응답 문제, 수동 확인 필요',
              })[bump.overall] || bump.overall;
              lines.push('', overallBadge);
              bumpSection = '\n' + lines.join('\n') + '\n';
            }

            // LLM assessment + 사람 액션 (AC 형식)
            let llmSection = '';
            let actionSection = '';
            if (assessment) {
              llmSection = [
                ``,
                `### 🧠 LLM 분석 — ${intentBadgeMap[assessment.intent] || assessment.intent}`,
                ``,
                assessment.rationale || '',
              ].join('\n');
              const focus = assessment.reviewer_focus || [];
              if (focus.length) {
                actionSection = [
                  ``,
                  `### 👤 사람 액션`,
                  ``,
                  ...focus.map(f => `- [ ] ${f}`),
                ].join('\n');
              }
            }

            const findings = (result.findings || []).slice(0, 5).map(f =>
              `- **[${f.severity}]** \`${f.category}\` @ ${linkFile(repo, headSha, f.location)} — ${f.description}`
            ).join('\n');

            const body = [
              `## ${emoji} Pre-Merge Review: \`${result.verdict}\``,
              ``,
              `Policy: ${linkPolicyVer} (${linkPolicySha})  ·  ${linkRun}`,
              bumpSection,
              llmSection,
              actionSection,
              ``,
              `<details><summary>🔍 Findings (${(result.findings || []).length})</summary>`,
              ``,
              findings || '_(none)_',
              ``,
              `</details>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber, body: body,
            });
